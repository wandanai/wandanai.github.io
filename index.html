<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XD</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      overflow: hidden;
      height: 100%;
    }

    /* ===== LOADING PAGE ===== */
    #loading {
      position: fixed;
      inset: 0;
      background: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      gap: 20px;
      font-family: sans-serif;
    }
    #loading.hidden { display: none; }
    #loading-text {
      font-size: 24px;
      font-weight: bold;
      color: #555;
    }
    #loading-bar-wrap {
      width: 300px;
      height: 16px;
      background: #eee;
      border-radius: 999px;
      overflow: hidden;
    }
    #loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f9a8d4, #818cf8);
      border-radius: 999px;
      transition: width 0.2s ease;
    }
    #loading-pct {
      font-size: 16px;
      color: #888;
    }

    /* ===== XD PAGE ===== */
    #xd {
      position: fixed;
      inset: 0;
      background: white;
      overflow: hidden;
      z-index: 9999;
    }
    #character {
      position: absolute;
      left: -400px;
      bottom: 50px;
      width: 400px;
      height: 400px;
      transition: left 0.12s ease;
    }
    #character img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
    }
    .random-image {
      position: absolute;
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.15s ease;
      pointer-events: none;
    }
    .random-image.show { opacity: 1; transition: none; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .bouncing { animation: bounce 0.08s ease; }
  </style>
</head>
<body>
  <!-- ===== LOADING PAGE ===== -->
  <div id="loading">
    <div id="loading-text">Loading...</div>
    <div id="loading-bar-wrap">
      <div id="loading-bar"></div>
    </div>
    <div id="loading-pct">0%</div>
  </div>

  <!-- ===== XD PAGE ===== -->
  <div id="xd">
    <div id="character">
      <img src="https://static.wikitide.net/bluearchivewiki/3/3b/Mika_00.png" alt="Character" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect width=%22400%22 height=%22400%22 fill=%22%23ffd700%22 rx=%2210%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%22150%22%3E🎭%3C/text%3E%3C/svg%3E'">
    </div>
  </div>

  <script>
    const imageUrls = [
      'https://i.pinimg.com/236x/9a/94/a8/9a94a8106097886630670cd2291f7844.jpg',
      'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSxBsajVoYcVVn87SqbRYW1DVB4V7CXCQaGnmc4yHuTZg&s=10',
      'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTvFKLXzonB6hrh2YpCLUyaO0XTeretee5Uwf5Ma4Gt2g&s=10',
      'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRGyzapBm3wN3CooaGS1tRmpMR_0X3nBsJAJz7aKp6X_r87wpHovt00upfa&s=10',
      'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcROTOFdJykkFcFRqCtgWSQXdrA-xNbHS56AdZ94b7wp1eNgYbb4SSZVDVo&s=10',
      'https://cdn.donmai.us/original/1c/fb/1cfb5635bdf056b1ec427584f473c444.jpg',
      'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTpyoPuCkadM9wiiCxzSsBh1Q6FO3pkx-BgHQ6KeUj88A&s=10'
    ];

    const loadingEl   = document.getElementById('loading');
    const loadingBar  = document.getElementById('loading-bar');
    const loadingPct  = document.getElementById('loading-pct');
    const loadingText = document.getElementById('loading-text');

    // ── Preload รูปทุกใบ ──────────────────────────────────────────────
    let loaded = 0;
    const total = imageUrls.length;
    const cache = []; // กัน GC

    function updateBar() {
      const pct = Math.round((loaded / total) * 10);
      loadingBar.style.width = pct + '%';
      loadingPct.textContent = pct + '%';
    }

    function tryStart() {
      if (loaded / total >= 0.5) {
        loadingEl.classList.add('hidden');
        startAnimation();
      }
    }

    imageUrls.forEach(url => {
      const img = new Image();
      img.onload = img.onerror = () => {
        loaded++;
        updateBar();
        tryStart();
      };
      img.src = url;
      cache.push(img);
    });

    // ── Animation ──────────────────────────────────────────────────────
    function startAnimation() {
      const character    = document.getElementById('character');
      const characterImg = character.querySelector('img');

      let position = -400;
      const updateTargetPosition = () => (window.innerWidth / 2) - 200;
      let targetPosition = updateTargetPosition();
      let jumpCount = 0;
      const totalJumps = 10;
      const jumpInterval = 250;

      window.addEventListener('resize', () => {
        targetPosition = updateTargetPosition();
        if (jumpCount >= totalJumps) {
          character.style.left = targetPosition + 'px';
        }
      });

      function jump() {
        if (jumpCount < totalJumps) {
          character.classList.add('bouncing');
          setTimeout(() => character.classList.remove('bouncing'), 80);

          const jumpDistance = (targetPosition - position) / (totalJumps - jumpCount);
          position += jumpDistance;
          character.style.left = position + 'px';
          jumpCount++;

          setTimeout(jump, jumpInterval);
        } else {
          characterImg.src = 'https://static.wikitide.net/bluearchivewiki/e/e0/Mika_10.png';
          apocalypse();
        }
      }

      function apocalypse() {
        const xd = document.getElementById('xd');
        setInterval(() => {
          const frag = document.createDocumentFragment();
          for (let i = 0; i < 1000; i++) {
            const img = document.createElement('img');
            img.className = 'random-image show';
            img.src = imageUrls[Math.floor(Math.random() * imageUrls.length)];
            img.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            img.style.top  = Math.random() * (window.innerHeight - 100) + 'px';
            frag.appendChild(img);
          }
          xd.appendChild(frag);
        }, 10);
      }

      setTimeout(jump, 200);
    }
  </script>
</body>
</html>

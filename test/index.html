<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <main class="min-h-screen flex flex-col items-center justify-center gap-6 px-4 text-center">
    <span class="inline-flex items-center gap-2 rounded-full bg-emerald-100 text-emerald-700 px-4 py-1 text-sm font-medium">
      <span class="relative flex h-2 w-2">
        <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-emerald-500 opacity-75"></span>
        <span class="relative inline-flex h-2 w-2 rounded-full bg-emerald-600"></span>
      </span>
      รอแปปน๊า
    </span>
    <p id="status" class="text-sm text-slate-400">รอแปปน๊า...</p>
  </main>
  <script>
    // ====== แก้ 2 บรรทัดนี้ ======
    const SUPABASE_URL = "https://ipcfkaqgfrevxnvdzjfz.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_Zul6OJfy9jOHlLgA2jIKAQ_IFMd4Lkk";
    // =============================

    (function () {
      const startTime = Date.now();
      let maxScroll = 0;
      let clicks = 0;
      let sent = false; // กันส่งซ้ำ

      // ติดตามการเลื่อนหน้า
      window.addEventListener("scroll", function () {
        const scrolled = window.scrollY + window.innerHeight;
        const pct = Math.round((scrolled / document.body.scrollHeight) * 100);
        if (pct > maxScroll) maxScroll = Math.min(pct, 100);
      });

      // ติดตามการคลิก
      window.addEventListener("click", function () { clicks++; });

      // ตรวจชนิดอุปกรณ์/OS/เบราว์เซอร์ จาก User-Agent
      function parseUA(ua) {
        let device = "Desktop";
        if (/iPhone|iPod/.test(ua)) device = "iPhone";
        else if (/iPad/.test(ua)) device = "iPad";
        else if (/Android/.test(ua)) device = /Mobile/.test(ua) ? "Android Phone" : "Android Tablet";
        else if (/Mobile/.test(ua)) device = "Mobile";

        let os = "Unknown";
        if (/Windows NT 10/.test(ua)) os = "Windows 10/11";
        else if (/Windows/.test(ua)) os = "Windows";
        else if (/Mac OS X/.test(ua)) os = "macOS";
        else if (/Android/.test(ua)) os = "Android";
        else if (/iPhone|iPad|iPod/.test(ua)) os = "iOS";
        else if (/Linux/.test(ua)) os = "Linux";

        let browser = "Unknown";
        if (/Edg\//.test(ua)) browser = "Edge";
        else if (/OPR\//.test(ua)) browser = "Opera";
        else if (/Chrome\//.test(ua)) browser = "Chrome";
        else if (/Firefox\//.test(ua)) browser = "Firefox";
        else if (/Safari\//.test(ua)) browser = "Safari";

        return { device, os, browser };
      }

      const ua = navigator.userAgent;
      const { device, os, browser } = parseUA(ua);

      // ขอ "รุ่นอุปกรณ์" จาก UA Client Hints (Android/Chrome ได้รหัสรุ่นจริง,
      // iPhone/Safari ไม่รองรับ จะ fallback เป็น "iPhone")
      async function getDeviceModel() {
        try {
          if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
            const hints = await navigator.userAgentData.getHighEntropyValues([
              "model",
              "platformVersion",
              "platform",
            ]);
            if (hints.model) return hints.model; // เช่น "SM-G991B", "Pixel 7"
          }
        } catch (e) {
          // เงียบไว้ ถ้าเบราว์เซอร์ไม่รองรับ
        }
        // fallback สำหรับ iPhone/Safari: ดึงจาก User-Agent
        if (/iPhone/.test(ua)) return "iPhone";
        if (/iPad/.test(ua)) return "iPad";
        const m = ua.match(/$$([^)]+)$$/);
        return m ? m[1] : null;
      }

      // ดึงรุ่นไว้ล่วงหน้าตั้งแต่เปิดหน้า เพราะ getHighEntropyValues เป็น async
      // ถ้ารอตอน pagehide จะไม่ทัน รุ่นจะหลุด
      let cachedModel = null;
      getDeviceModel().then(function (m) { cachedModel = m; });

      function send() {
        if (sent) return; // ส่งครั้งเดียวพอ
        sent = true;

        const payload = {
          visited_at: new Date().toISOString(),
          page_url: window.location.href,
          referrer: document.referrer || null,
          language: navigator.language,
          user_agent: ua,
          device: device,
          device_model: cachedModel, // ใช้ค่าที่ดึงไว้ล่วงหน้า
          os: os,
          browser: browser,
          screen_width: window.screen.width,
          screen_height: window.screen.height,
          viewport_width: window.innerWidth,
          viewport_height: window.innerHeight,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
          scroll_depth: maxScroll,
          clicks: clicks,
          duration_seconds: Math.round((Date.now() - startTime) / 1000),
        };

        const url = SUPABASE_URL + "/rest/v1/visits";

        fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_ANON_KEY,
            "Authorization": "Bearer " + SUPABASE_ANON_KEY,
            "Prefer": "return=minimal",
          },
          body: JSON.stringify(payload),
          keepalive: true,
        })
          .then(function (res) {
            document.getElementById("status").textContent =
              res.ok ? "บันทึกข้อมูลสำเร็จ" : "เกิดข้อผิดพลาด: " + res.status;
          })
          .catch(function (e) {
            document.getElementById("status").textContent = "ส่งข้อมูลไม่สำเร็จ";
          });
      }

      // ส่งตอนผู้ใช้กำลังจะออกจากหน้า (ได้เวลา/scroll/clicks ครบ)
      window.addEventListener("pagehide", send);
      // เผื่อ pagehide ไม่ทำงาน ส่งหลัง 15 วิ ด้วย
      setTimeout(send, 15000);
    })();
  </script>
    </body>
</html>
